apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: shopmicro
type: Opaque
stringData:
  DB_PASSWORD: orders_pass123
  JWT_SECRET: change-me-in-real-env
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: shopmicro
data:
  DB_HOST: db-orders
  DB_NAME: orders_db
  DB_USER: orders_user
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopmicro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: shopmicro/user-service:1.0.0
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: shopmicro
spec:
  selector:
    app: user-service
  ports:
    - port: 5000
      targetPort: 5000

