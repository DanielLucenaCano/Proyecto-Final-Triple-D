services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - public-net
    healthcheck:
      test: ["CMD-SHELL", "ps | grep 'nginx: master process' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8081:80"
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - public-net
      - service-net
    healthcheck:
      test: ["CMD-SHELL", "ps | grep 'nginx: master process' >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  product-service:
    build:
      context: ./product-service
    environment:
      DB_HOST: db-products
      DB_NAME: ${PRODUCTS_DB}
      DB_USER: ${PRODUCTS_DB_USER}
      DB_PASSWORD: ${PRODUCTS_DB_PASSWORD}
      REDIS_HOST: cache
      REDIS_PORT: 6379
      REDIS_TTL: ${REDIS_TTL:-60}
    depends_on:
      db-products:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - service-net
      - data-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./order-service
    environment:
      DB_HOST: db-orders
      DB_NAME: ${ORDERS_DB}
      DB_USER: ${ORDERS_DB_USER}
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      PRODUCT_SERVICE_URL: http://product-service:5000
      RABBITMQ_HOST: message-queue
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      db-orders:
        condition: service_healthy
      message-queue:
        condition: service_healthy
      product-service:
        condition: service_healthy
    networks:
      - service-net
      - data-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./user-service
    environment:
      DB_HOST: db-orders
      DB_NAME: ${ORDERS_DB}
      DB_USER: ${ORDERS_DB_USER}
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db-orders:
        condition: service_healthy
    networks:
      - service-net
      - data-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
    environment:
      RABBITMQ_HOST: message-queue
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      message-queue:
        condition: service_healthy
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  db-products:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PRODUCTS_DB}
      MYSQL_USER: ${PRODUCTS_DB_USER}
      MYSQL_PASSWORD: ${PRODUCTS_DB_PASSWORD}
    volumes:
      - db_products_data:/var/lib/mysql
      - ./db/products-init:/docker-entrypoint-initdb.d
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 8

  db-orders:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${ORDERS_DB}
      MYSQL_USER: ${ORDERS_DB_USER}
      MYSQL_PASSWORD: ${ORDERS_DB_PASSWORD}
    volumes:
      - db_orders_data:/var/lib/mysql
      - ./db/orders-init:/docker-entrypoint-initdb.d
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 8

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  message-queue:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  db_products_data:
  db_orders_data:
  rabbitmq_data:

networks:
  public-net:
  service-net:
  data-net:
