apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cache-data
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.cache.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
{{ toYaml .Values.cache.resources | indent 12 }}
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: cache-data
              mountPath: /data
      volumes:
        - name: cache-data
          persistentVolumeClaim:
            claimName: cache-data
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  selector:
    app: cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: {{ include "shopmicro.namespace" . }}
type: Opaque
stringData:
  rabbitmq-password: {{ .Values.messageQueue.password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: {{ include "shopmicro.namespace" . }}
data:
  RABBITMQ_DEFAULT_USER: {{ .Values.sharedConfig.rabbitmqUser | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: message-queue-data
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.messageQueue.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-queue
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-queue
  template:
    metadata:
      labels:
        app: message-queue
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef:
                  name: rabbitmq-config
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: rabbitmq-password
          resources:
{{ toYaml .Values.messageQueue.resources | indent 12 }}
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: message-queue-data
---
apiVersion: v1
kind: Service
metadata:
  name: message-queue
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  selector:
    app: message-queue
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
