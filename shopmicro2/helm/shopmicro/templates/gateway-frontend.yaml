apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: {{ include "shopmicro.namespace" . }}
data:
  nginx.conf: |
    upstream product_service {
        server product-service:5000;
    }
    upstream order_service {
        server order-service:5000;
    }
    upstream user_service {
        server user-service:5000;
    }
    server {
        listen 80;
        server_name _;
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        location /api/products {
            proxy_pass http://product_service/products;
        }
        location /api/orders {
            proxy_pass http://order_service/orders;
        }
        location /api/users/register {
            proxy_pass http://user_service/users/register;
        }
        location /api/users/login {
            proxy_pass http://user_service/users/login;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: {{ .Values.apiGateway.image.repository }}:{{ .Values.apiGateway.image.tag }}
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
{{ toYaml .Values.apiGateway.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: gateway-config
          configMap:
            name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          ports:
            - containerPort: 80
              name: http
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
