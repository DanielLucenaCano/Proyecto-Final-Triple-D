apiVersion: v1
kind: Secret
metadata:
  name: db-products-secret
  namespace: {{ include "shopmicro.namespace" . }}
type: Opaque
stringData:
  mysql-root-password: {{ .Values.dbProducts.rootPassword | quote }}
  mysql-password: {{ .Values.dbProducts.password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-products-config
  namespace: {{ include "shopmicro.namespace" . }}
data:
  MYSQL_DATABASE: {{ .Values.sharedConfig.dbProductsName | quote }}
  MYSQL_USER: {{ .Values.sharedConfig.dbProductsUser | quote }}
  init.sql: |
    CREATE DATABASE IF NOT EXISTS products_db;
    USE products_db;
    CREATE TABLE IF NOT EXISTS products (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(120) NOT NULL,
      description TEXT,
      price DECIMAL(10,2) NOT NULL,
      stock INT NOT NULL DEFAULT 0
    );
    INSERT INTO products (name, description, price, stock)
    VALUES
      ('Mechanical Keyboard', 'RGB mechanical keyboard for gaming', 79.99, 12),
      ('Monitor 27 inch', 'QHD IPS monitor for productivity', 229.00, 7),
      ('Wireless Mouse', 'Ergonomic rechargeable wireless mouse', 39.50, 18);
---
apiVersion: v1
kind: Service
metadata:
  name: db-products-headless
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  clusterIP: None
  selector:
    app: db-products
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: db-products
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  selector:
    app: db-products
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-products
  namespace: {{ include "shopmicro.namespace" . }}
spec:
  serviceName: db-products-headless
  replicas: 1
  selector:
    matchLabels:
      app: db-products
  template:
    metadata:
      labels:
        app: db-products
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: db-products-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: db-products-config
                  key: MYSQL_USER
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-products-secret
                  key: mysql-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-products-secret
                  key: mysql-password
          resources:
{{ toYaml .Values.dbProducts.resources | indent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              subPath: init.sql
      volumes:
        - name: init-script
          configMap:
            name: db-products-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.dbProducts.storage }}
