apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secret
  namespace: shopmicro
type: Opaque
stringData:
  RABBITMQ_PASSWORD: shopmicro-pass
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: shopmicro
data:
  APP_VERSION: "1.1.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: shopmicro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: shopmicro/notification-service:1.1.0
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopmicro-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_USER
              valueFrom:
                configMapKeyRef:
                  name: shopmicro-config
                  key: RABBITMQ_USER
          envFrom:
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: notification-service-secret
          resources:
            requests:
              cpu: 75m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: shopmicro
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
