apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  namespace: shopmicro
type: Opaque
stringData:
  DB_PASSWORD: orders_pass123
  RABBITMQ_PASSWORD: shopmicro-pass
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: shopmicro
data:
  DB_HOST: db-orders
  DB_NAME: orders_db
  DB_USER: orders_user
  PRODUCT_SERVICE_URL: http://product-service:5000
  RABBITMQ_HOST: message-queue
  RABBITMQ_USER: shopmicro
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: shopmicro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: shopmicro/order-service:1.0.0
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: shopmicro
spec:
  selector:
    app: order-service
  ports:
    - port: 5000
      targetPort: 5000

