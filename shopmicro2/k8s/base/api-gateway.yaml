apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: shopmicro
type: Opaque
stringData:
  gateway-marker: shopmicro-gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: shopmicro
data:
  nginx.conf: |
    upstream product_service {
        server product-service:5000;
    }
    upstream order_service {
        server order-service:5000;
    }
    upstream user_service {
        server user-service:5000;
    }
    server {
        listen 80;
        server_name _;
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
        location /api/products {
            proxy_pass http://product_service/products;
        }
        location /api/orders {
            proxy_pass http://order_service/orders;
        }
        location /api/users/register {
            proxy_pass http://user_service/users/register;
        }
        location /api/users/login {
            proxy_pass http://user_service/users/login;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shopmicro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: shopmicro/api-gateway:1.0.0
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
      volumes:
        - name: gateway-config
          configMap:
            name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shopmicro
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081

