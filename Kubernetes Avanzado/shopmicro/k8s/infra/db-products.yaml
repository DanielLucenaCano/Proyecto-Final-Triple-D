apiVersion: v1
kind: Secret
metadata:
  name: db-products-secret
  namespace: shopmicro
type: Opaque
stringData:
  mysql-root-password: rootpass123
  mysql-password: products_pass123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-products-config
  namespace: shopmicro
data:
  MYSQL_DATABASE: products_db
  MYSQL_USER: products_user
  init.sql: |
    CREATE DATABASE IF NOT EXISTS products_db;
    USE products_db;
    CREATE TABLE IF NOT EXISTS products (
      id INT AUTO_INCREMENT PRIMARY KEY,
      name VARCHAR(120) NOT NULL,
      description TEXT,
      price DECIMAL(10,2) NOT NULL,
      stock INT NOT NULL DEFAULT 0
    );
    INSERT INTO products (name, description, price, stock)
    VALUES
      ('Teclat mecànic', 'Teclat gaming amb retroil·luminació RGB', 79.99, 12),
      ('Monitor 27 polzades', 'Pantalla IPS QHD per a productivitat', 229.00, 7),
      ('Ratolí sense fils', 'Ratolí ergonòmic amb bateria recarregable', 39.50, 18);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-products
  namespace: shopmicro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-products
  template:
    metadata:
      labels:
        app: db-products
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: db-products-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: db-products-config
                  key: MYSQL_USER
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-products-secret
                  key: mysql-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-products-secret
                  key: mysql-password
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: db-products-data
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              subPath: init.sql
      volumes:
        - name: db-products-data
          emptyDir: {}
        - name: init-script
          configMap:
            name: db-products-config
---
apiVersion: v1
kind: Service
metadata:
  name: db-products
  namespace: shopmicro
spec:
  selector:
    app: db-products
  ports:
    - port: 3306
      targetPort: 3306

