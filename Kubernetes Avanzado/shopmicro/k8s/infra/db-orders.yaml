apiVersion: v1
kind: Secret
metadata:
  name: db-orders-secret
  namespace: shopmicro
type: Opaque
stringData:
  mysql-root-password: rootpass123
  mysql-password: orders_pass123
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-orders-config
  namespace: shopmicro
data:
  MYSQL_DATABASE: orders_db
  MYSQL_USER: orders_user
  init.sql: |
    CREATE DATABASE IF NOT EXISTS orders_db;
    USE orders_db;
    CREATE TABLE IF NOT EXISTS orders (
      id INT AUTO_INCREMENT PRIMARY KEY,
      user_id INT NOT NULL,
      product_id INT NOT NULL,
      quantity INT NOT NULL DEFAULT 1,
      status VARCHAR(40) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TABLE IF NOT EXISTS users (
      id INT AUTO_INCREMENT PRIMARY KEY,
      email VARCHAR(120) NOT NULL UNIQUE,
      password VARCHAR(255) NOT NULL,
      full_name VARCHAR(120) NOT NULL
    );
    INSERT INTO users (email, password, full_name)
    VALUES ('demo@shopmicro.local', 'demo1234', 'Demo User');
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-orders
  namespace: shopmicro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-orders
  template:
    metadata:
      labels:
        app: db-orders
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: db-orders-config
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: db-orders-config
                  key: MYSQL_USER
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-orders-secret
                  key: mysql-root-password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-orders-secret
                  key: mysql-password
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: db-orders-data
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/01-schema.sql
              subPath: init.sql
      volumes:
        - name: db-orders-data
          emptyDir: {}
        - name: init-script
          configMap:
            name: db-orders-config
---
apiVersion: v1
kind: Service
metadata:
  name: db-orders
  namespace: shopmicro
spec:
  selector:
    app: db-orders
  ports:
    - port: 3306
      targetPort: 3306

